name: "home_menu"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: home_menu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: backend
      dockerfile: ./build/Dockerfile.local
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads

  # frontend:
  #   build:
  #     context: frontend
  #     dockerfile: ./build/Dockerfile.local
  #   ports:
  #    - "5173:5173"
  #   env_file:
  #     - frontend/.env
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
